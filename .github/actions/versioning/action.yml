name: "Semantic Versioning"
description: "Semver + conventional commits + prerelease (PowerShell)"

inputs:
  prerelease:
    description: "Prerelease identifier"
    required: false
    default: ""

outputs:
  version:
    description: "The calculated semantic version"
    value: ${{ steps.version.outputs.version }}
  version_tag:
    description: "The calculated semantic version with 'v' prefix"
    value: ${{ steps.version.outputs.version_tag }}
  is_prerelease:
    description: "Whether the version is a prerelease"
    value: ${{ steps.version.outputs.is_prerelease }}

runs:
  using: "composite"
  steps:
    - name: Fetch tags
      shell: pwsh
      run: git fetch --tags --force

    - name: Get latest tag
      id: tag
      shell: pwsh
      run: |
        $allTags = @(git tag --sort=-version:refname)
        $tag = if ($allTags.Count -gt 0) { $allTags[0] } else { $null }

        if ([string]::IsNullOrWhiteSpace($tag)) {
          $tag = "v1.0.0"
          "no_tag=true" >> $env:GITHUB_OUTPUT
        } else {
          "no_tag=false" >> $env:GITHUB_OUTPUT
        }

        "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Determine bump
      id: bump
      shell: pwsh
      run: |
        $last = "${{ steps.tag.outputs.tag }}"
        $noTag = "${{ steps.tag.outputs.no_tag }}" -eq "true"

        if ($noTag) {
          $commits = @(git log --pretty=format:%s -n 50)
        } else {
          $commits = @(git log "$last..HEAD" --pretty=format:%s)
        }

        $bump = "patch"
        foreach ($line in $commits) {
          if ($line -match "BREAKING CHANGE")       { $bump = "major"; break }
          if ($line -match "^[a-z]+(\(.+\))?!:")    { $bump = "major"; break }
          if ($line -match "^major")                { $bump = "major"; break }
          if ($line -match "^feat|^minor") {
            if ($bump -ne "major") { $bump = "minor" }
          }
        }

        "bump=$bump" >> $env:GITHUB_OUTPUT

    - name: Calculate version
      id: version
      shell: pwsh
      run: |
        $tag = "${{ steps.tag.outputs.tag }}".TrimStart('v')

        $parts = $tag.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]

        switch ("${{ steps.bump.outputs.bump }}") {
          "major" { $major++; $minor = 0; $patch = 0 }
          "minor" { $minor++; $patch = 0 }
          default { $patch++ }
        }

        $base = "$major.$minor.$patch"
        $pre = "${{ inputs.prerelease }}"

        if (![string]::IsNullOrWhiteSpace($pre)) {
          $version = "$base-$pre"
          $isPre = "true"
        } else {
          $version = $base
          $isPre = "false"
        }

        "version=$version" >> $env:GITHUB_OUTPUT
        "version_tag=v$version" >> $env:GITHUB_OUTPUT
        "is_prerelease=$isPre" >> $env:GITHUB_OUTPUT

    - name: Generate changelog
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $date = Get-Date -Format "yyyy-MM-dd"
        $noTag = "${{ steps.tag.outputs.no_tag }}" -eq "true"

        $content = @()
        $content += "## v$version ($date)"
        $content += ""

        if ($noTag) {
          $content += "First release - please check git log for full details."
        } else {
          $previousTag = "${{ steps.tag.outputs.tag }}"
          $commits = @(git log "$previousTag..HEAD" --pretty=format:%s -n 50)
          $content += $commits
        }

        $content | Out-File CHANGELOG.md -Encoding utf8